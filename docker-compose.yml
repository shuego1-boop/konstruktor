version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: konstruktor-postgres
    environment:
      POSTGRES_DB: konstruktor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: konstruktor-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/konstruktor
      PORT: 3000
      NODE_ENV: development
      BETTER_AUTH_SECRET: dev-secret-key
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules

volumes:
  postgres_data:
